name: CI/CD Pipeline - DietaApp

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar Testes com pytest
        run: |
          pytest tests/ --junitxml=relatorio-testes.xml

      - name: Salvar Relatório de Testes como Artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: relatorio-testes
          path: relatorio-testes.xml

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências de Build
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Gerar Pacote Distribuível
        run: python -m build

      - name: Salvar Pacote gerado como Artifact
        uses: actions/upload-artifact@v3
        with:
          name: pacote-build
          path: dist/


