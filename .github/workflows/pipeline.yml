name: CI/CD Pipeline - DietaApp

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4 # Atualizado para v4

      - name: Configurar Python
        uses: actions/setup-python@v5 
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Executar Testes com pytest
        run: |
          pytest --junitxml=relatorio-testes.xml

      - name: Salvar Relatório de Testes como Artifact
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-testes
          path: relatorio-testes.xml

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4 

      - name: Empacotar Projeto (Build)
        run: |
          zip -r pacote-distribuivel.zip . -x "*.git*" "venv/*" "__pycache__/*" ".pytest_cache/*"

      - name: Salvar Pacote gerado como Artifact
        uses: actions/upload-artifact@v4 
        with:
          name: pacote-build
          path: pacote-distribuivel.zip

  deploy:
    needs: [test, build]
    runs-on: ubuntu-latest
    steps:
      - name: Disparar Deploy no Render via Webhook
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "Erro: Secret RENDER_DEPLOY_HOOK não configurada no GitHub."
            exit 1
          fi
          echo "Testes e Build passaram! Disparando deploy no Render..."
          # O curl faz uma requisição POST invisível para a URL do Render
          curl -X POST $DEPLOY_HOOK
          echo "Sinal de deploy enviado com sucesso ao Render!"
  
  notify:
    needs: [test, build, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Rodar script de notify
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_RECEIVER: ${{ vars.EMAIL_RECEIVER }}
          TEST_STATUS: ${{ needs.test.result }}
          BUILD_STATUS: ${{ needs.build.result }}
        run: python notify.py
